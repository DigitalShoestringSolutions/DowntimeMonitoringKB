# Recipe format compatibility check i.e. what versions of the assembler does this recipe work with? 
recipe_vsn = "1.0.0"



# About the solution as a whole
[solution]
    name = "Downtime Monitoring"
    slug = "downtime"
    version = "3.2.0"
    description = "Shoestring Downtime Monitoring Solution"



[service_module.sensing]
    source="sensing"
    containers = ["sensing"]
    template.log_level = "info"

# Service module instances present in this solution
[service_module.analysis-1]
    source = "analysis"
    containers = ["analysis-sm"]
    ports.analysis-sm.api = 8000
    template.log_level = "info"

# [service_module.analysis-2]
#     source = "analysis"
#     containers = ["analysis-sm"]
#     ports.analysis-sm.api = 9000
#     template.log_level = "info"

# [service_module.analysis-3]
#     source = "analysis"
#     containers = ["analysis-sm"]
#     ports.analysis-sm.api = 10000
#     template.log_level = "info"

[service_module.db]
    source = "data_storage"
    containers = ["db"]
    ports.db.api = 8001
    alias.db = "data-storage"

[service_module.dashboards]
    source = "grafana"
    containers = ["grafana"]
    ports.grafana.ui = 3000
    template.disable_sanitise_html = "false"

[service_module.user-input]
    source = "user_input"
    containers = ["webserver"]
    ports.webserver.ui = 80



# Infrastructure modules present in this solution
[infrastructure.mqtt-broker]
    source = "mqtt_broker"
    containers = ["broker"]
    ports.broker.tcp = 1883
    ports.broker.websocket = 9001
    alias.broker = "mqtt"

[infrastructure.logging]
    source = "logging"
    containers = ["alloy","loki"]
    ports.loki.api = 3100
    alias.loki = "loki"
    alias.alloy = "alloy"
    volume.alloy.docker_sock = "/var/run/docker.sock"

[infrastructure.platform_link]
    source = "plink"
    containers = ["link"]
    ports.link.ui = 5000
    alias.link = "platform_link"



# Available module code sources which can feed the above instances
[source.sensing]
    git.path = "sm_SensingDC"
    git.tag = "v1.5.0"

[source.grafana]
    git.path = "sm_grafana_ui"
    git.tag = "v2.1.0"

[source.data_storage]
    git.path = "django_relational_db"
    git.tag = "v1.1.0"

[source.user_input]
    git.path = "react_ui"
    git.tag = "v1.0.0"

[source.analysis]
    git.path = "sm_analysis"
    git.tag = "v0.2.3"

[source.mqtt_broker]
    git.path = "sm_mqtt_broker"
    git.tag = "v2.0.0"

[source.logging]
    git.path = "Logging"
    git.tag = "v1.0.1"

[source.plink]
    git.path = "PlatformLink"
    git.tag = "v1.0.0"
